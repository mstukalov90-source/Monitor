services:
  db:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    image: monitor-postgis:16-3.4-cron
    container_name: monitor-db
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=monitor
      - -c
      - cron.timezone=Europe/Moscow
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monitor}
      POSTGRES_USER: ${POSTGRES_USER:-monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monitor}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./sql/04_data_mos_dynamic_tables.sql:/docker-entrypoint-initdb.d/02-data-mos-dynamic-tables.sql:ro
      - ./sql/05_data_mos_purge_functions.sql:/docker-entrypoint-initdb.d/03-data-mos-purge-functions.sql:ro
      - ./sql/06_data_mos_extra_tables.sql:/docker-entrypoint-initdb.d/04-data-mos-extra-tables.sql:ro
      - ./sql/07_line_to_polygon.sql:/docker-entrypoint-initdb.d/05-line-to-polygon.sql:ro
      - ./sql/09_data_mos_geom_split.sql:/docker-entrypoint-initdb.d/06-data-mos-geom-split.sql:ro
      - ./sql/11_odh_export_ogh_disruption.sql:/docker-entrypoint-initdb.d/07-odh-export-ogh-disruption.sql:ro
      - ./sql/12_odh_export_ogh_disruption_coords.sql:/docker-entrypoint-initdb.d/08-odh-export-ogh-disruption-coords.sql:ro
      - ./sql/13_odh_export_move_schema.sql:/docker-entrypoint-initdb.d/09-odh-export-move-schema.sql:ro
      - ./sql/14_lens_stroymonitoring_purge_functions.sql:/docker-entrypoint-initdb.d/10-lens-stroymonitoring-purge-functions.sql:ro
      - ./sql/15_genplan_photo_meta_uuid.sql:/docker-entrypoint-initdb.d/11-genplan-photo-meta-uuid.sql:ro
      - ./sql/16_genplan_uploaded_photo.sql:/docker-entrypoint-initdb.d/12-genplan-uploaded-photo.sql:ro
      - ./sql/17_genplan_uuid_api.sql:/docker-entrypoint-initdb.d/13-genplan-uuid-api.sql:ro
      - ./sql/20_mggt_station_tables.sql:/docker-entrypoint-initdb.d/14-mggt-station-tables.sql:ro
      - ./sql/26_mggt_station_wgs84_attrs.sql:/docker-entrypoint-initdb.d/15-mggt-station-wgs84.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitor} -d ${POSTGRES_DB:-monitor}"]
      interval: 5s
      timeout: 5s
      retries: 10

  collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monitor-collector
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Europe/Moscow}
      LOCAL_DB_HOST: db
      LOCAL_DB_PORT: 5432
      LOCAL_DB_NAME: ${POSTGRES_DB:-monitor}
      LOCAL_DB_USER: ${POSTGRES_USER:-monitor}
      LOCAL_DB_PASSWORD: ${POSTGRES_PASSWORD:-monitor}
      REMOTE_DB_HOST: ${REMOTE_DB_HOST:-172.16.206.170}
      REMOTE_DB_PORT: ${REMOTE_DB_PORT:-5432}
      REMOTE_DB_NAME: ${REMOTE_DB_NAME:-sps}
      REMOTE_DB_USER: ${REMOTE_DB_USER:-asidorov}
      REMOTE_DB_PASSWORD: ${REMOTE_DB_PASSWORD:-qwerty1234}
      WEB_GEO_DB_HOST: ${WEB_GEO_DB_HOST:-172.21.198.149}
      WEB_GEO_DB_PORT: ${WEB_GEO_DB_PORT:-5432}
      WEB_GEO_DB_NAME: ${WEB_GEO_DB_NAME:-web_geo}
      WEB_GEO_DB_USER: ${WEB_GEO_DB_USER:-asidorov}
      WEB_GEO_DB_PASSWORD: ${WEB_GEO_DB_PASSWORD:-8XoMsO3Vyz}
      DATA_MOS_API_KEY: ${DATA_MOS_API_KEY:-}
      MSI_HOLES_CLIENT_ID: ${MSI_HOLES_CLIENT_ID:-}
      MSI_HOLES_CLIENT_SECRET: ${MSI_HOLES_CLIENT_SECRET:-}
      MSI_HOLES_BASE_URL: ${MSI_HOLES_BASE_URL:-https://m2m.msi-holes.cxm.dev}
      MSI_HOLES_TOKEN_ENDPOINT: ${MSI_HOLES_TOKEN_ENDPOINT:-https://id.cxm.dev/oauth2/token}
      MSI_HOLES_VERIFY_SSL: ${MSI_HOLES_VERIFY_SSL:-true}
      VECTOR_MKA_VERIFY_SSL: ${VECTOR_MKA_VERIFY_SSL:-false}
      GENPLAN_SEARCH_LAT: ${GENPLAN_SEARCH_LAT:-55.7558}
      GENPLAN_SEARCH_LNG: ${GENPLAN_SEARCH_LNG:-37.6173}
      GENPLAN_SEARCH_RADIUS_M: ${GENPLAN_SEARCH_RADIUS_M:-1000}
      GENPLAN_FETCH_META_LIMIT: ${GENPLAN_FETCH_META_LIMIT:-0}
      PROJECT_DIR: /app
    volumes:
      - .:/app
    command: ["python", "-m", "collector.scheduler"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monitor-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Europe/Moscow}
      LOCAL_DB_HOST: db
      LOCAL_DB_PORT: 5432
      LOCAL_DB_NAME: ${POSTGRES_DB:-monitor}
      LOCAL_DB_USER: ${POSTGRES_USER:-monitor}
      LOCAL_DB_PASSWORD: ${POSTGRES_PASSWORD:-monitor}
      MONITOR_API_KEY: ${MONITOR_API_KEY:-}
      MONITOR_API_KEYS: ${MONITOR_API_KEYS:-}
      MONITOR_API_PUBLIC_BASE_URL: ${MONITOR_API_PUBLIC_BASE_URL:-http://77.222.63.161:8000}
      PROJECT_DIR: /app
    ports:
      - "${MONITOR_API_PORT:-8000}:8000"
    volumes:
      - .:/app
    command: ["uvicorn", "collector.api.main:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  pgdata:
